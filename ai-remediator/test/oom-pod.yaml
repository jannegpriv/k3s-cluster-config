# Phase 6 test 2: OOMKilled
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-test
  namespace: remediator-test
spec:
  replicas: 1
  selector: {matchLabels: {app: oom-test}}
  template:
    metadata: {labels: {app: oom-test}}
    spec:
      containers:
      - name: hog
        image: busybox:1.36
        command: ["sh", "-c", "sleep 10; head -c 100m /dev/zero | tail"]
        resources:
          limits: {memory: 32Mi}
          requests: {memory: 16Mi}
