apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: replicapool
  namespace: rook-ceph
spec:
  # host-level failure domain so the 3 replicas always land on 3 different nodes
  # → losing one node can never take all copies (fix after 2026-07 incident).
  failureDomain: host
  replicated:
    requireSafeReplicaSize: true
    size: 3
  statusCheck:
    mirror:
      disabled: true  # Disable the mirror status check to prevent Prometheus metrics collection issues
