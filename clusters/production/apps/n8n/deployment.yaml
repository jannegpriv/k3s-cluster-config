apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      serviceAccountName: n8n
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: fix-permissions
        image: busybox
        command: ['sh', '-c', 'chown -R 1000:1000 /home/node/.n8n']
        volumeMounts:
        - name: data
          mountPath: /home/node/.n8n
      containers:
      - name: n8n
        image: n8nio/n8n:2.29.9
        ports:
        - containerPort: 5678
        env:
        - name: N8N_PORT
          value: "5678"
        - name: N8N_PROTOCOL
          value: "http"
        - name: N8N_HOST
          value: "n8n.local"
        - name: WEBHOOK_URL
          value: "http://n8n.local/"
        - name: GENERIC_TIMEZONE
          value: "Europe/Stockholm"
        - name: TZ
          value: "Europe/Stockholm"
        # --- ai-remediator config (read by tool sub-workflows via $env) ---
        # n8n 2.x blocks $env in Code nodes by default; the write-tool
        # guardrails read REMEDIATOR_* via $env, so unblock it.
        - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
          value: "false"
        # Kill switch: write tools are no-ops until this is "true".
        # Flip to "true" only after the approval gate (Phase 4) + safety
        # rails (Phase 5) are in place and Phase 6 tests pass.
        - name: REMEDIATOR_ENABLED
          value: "true"  # Phase 6 testing approved by Janne 2026-07-13; approval gate + rate limit + allow-list still guard every write
        - name: REMEDIATOR_NAMESPACES
          value: "openhab,mattermost,n8n,mosquitto,uptime-kuma,bitwarden,headlamp,authelia,loki,monitoring,remediator-test"
        - name: MAX_REPLICAS
          value: "3"
        - name: COOLDOWN_MINUTES
          value: "30"
        - name: MAX_ACTIONS_PER_HOUR
          value: "4"
        - name: N8N_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: encryption-key
        - name: EXECUTIONS_DATA_PRUNE
          value: "true"
        - name: EXECUTIONS_DATA_MAX_AGE
          value: "168"
        - name: N8N_SECURE_COOKIE
          value: "false"
        - name: N8N_EDITOR_BASE_URL
          value: "http://n8n.local"
        - name: N8N_SSO_SAML_ENABLED
          value: "false"
        - name: N8N_SSO_OIDC_ENABLED
          value: "false"
        - name: N8N_SSO_LDAP_ENABLED
          value: "false"
        resources:
          requests:
            cpu: 100m
            memory: 768Mi  # raised: pod evicted under memory pressure mid agent-run 2026-07-13
          limits:
            # 512Mi starved the Node.js heap during 2.29.9 DB migrations
            # (FATAL: JS heap out of memory at startup) — raised 2026-07-10.
            memory: 1Gi
        volumeMounts:
        - name: data
          mountPath: /home/node/.n8n
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: n8n-data
