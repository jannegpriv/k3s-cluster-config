# One RoleBinding per in-scope namespace (the allow-list). Adding a namespace
# here widens the agent's reach — keep in sync with REMEDIATOR_NAMESPACES in n8n.

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-remediator
  namespace: openhab
subjects:
  - kind: ServiceAccount
    name: ai-remediator
    namespace: automation
roleRef:
  kind: ClusterRole
  name: ai-remediator
  apiGroup: rbac.authorization.k8s.io
---
