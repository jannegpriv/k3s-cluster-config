apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/production/apps
  prune: true
  # SOPS decryption for *.enc.yaml secrets (first consumer:
  # monitoring/deadmans-switch-secret.enc.yaml). Without this Flux applies
  # the ciphertext verbatim.
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
